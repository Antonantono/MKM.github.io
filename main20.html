<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЕГЭ‑трекер | Ранги Dota 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, 'Montserrat', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0B0E1A, #02040C);
            min-height: 100vh;
            padding: 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .menu-screen, .subject-screen {
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid rgba(156, 108, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: fadeSlideUp 0.5s ease-out;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 2rem;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 2rem;
            background: linear-gradient(135deg, #e9d5ff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(192,132,252,0.3);
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.3rem;
        }

        .subject-card {
            background: #1e1b2e;
            border-radius: 1.5rem;
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid #6b21a5;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .subject-card:hover {
            transform: translateY(-5px);
            border-color: #c084fc;
            background: #2a2342;
            box-shadow: 0 15px 30px rgba(156, 108, 255, 0.3);
        }
        .subject-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #d8b4fe;
            margin-bottom: 0.5rem;
        }
        .subject-stats {
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .back-btn {
            background: #2d2a44;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #e9d5ff;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 1.2rem;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #4c3b7a;
            transform: scale(1.02);
        }

        /* Статистика 3 колонки без панели управления */
        .stats-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            background: #17142b;
            border-radius: 1.2rem;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #a855f7;
            gap: 10px;
        }
        .level-box, .total-tasks-box {
            font-weight: 600;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .level-box { justify-self: start; }
        .total-tasks-box { justify-self: end; }
        .xp-box { justify-self: center; text-align: center; font-weight: 600; color: #ddd; }
        .level-value, .xp-value, .total-value {
            font-weight: 800;
            color: #e9a23b;
            font-size: 1.6rem;
        }
        .rank-icon {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2a2342;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            color: #facc15;
            border: 1px solid #6b21a5;
        }
        .rank-icon svg {
            width: 16px;
            height: 16px;
        }

        /* Прогресс-бар с водным эффектом по всей полоске */
        .progress-area {
            margin: 20px 0 10px;
            position: relative;
        }
        .progress-bg {
            background: #2d2a44;
            border-radius: 30px;
            height: 28px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            background: linear-gradient(90deg, #c084fc, #a855f7);
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.6s cubic-bezier(0.22, 0.97, 0.36, 1.02);
            position: relative;
            box-shadow: 0 0 10px #c084fc;
        }
        /* Эффект кипения (пузырьки) по всей полоске */
        .progress-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,200,0.25) 2%, transparent 2.5%);
            background-size: 18px 18px;
            background-repeat: repeat;
            animation: bubbleBoil 0.8s linear infinite;
            pointer-events: none;
            border-radius: 30px;
        }
        /* Усиление кипения при высоком заполнении */
        .progress-fill.high-boil::before {
            background-size: 12px 12px;
            animation-duration: 0.4s;
        }
        /* Водная рябь справа (не только кончик, но она остаётся только справа для красоты) */
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -2px;
            top: -2px;
            bottom: -2px;
            width: 8px;
            background: linear-gradient(180deg, #9f7aea, #6b21a5, #c084fc);
            filter: blur(3px);
            border-radius: 10px;
            animation: waterWave 1.2s infinite alternate ease-in-out;
            opacity: 0.8;
        }
        @keyframes bubbleBoil {
            0% { background-position: 0 0; }
            100% { background-position: 20px 20px; }
        }
        @keyframes waterWave {
            0% { transform: translateX(0px) scaleY(1); opacity: 0.5; }
            100% { transform: translateX(3px) scaleY(1.2); opacity: 1; }
        }

        /* Кнопки заданий */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
            margin: 1rem 0;
        }
        .task-btn {
            background: #24213a;
            border: none;
            border-radius: 2rem;
            padding: 12px 0;
            font-weight: bold;
            font-size: 1rem;
            color: #e2e8f0;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 6px black;
        }
        .task-btn:not(.disabled):hover {
            background: #5b3d8c;
            transform: scale(1.05);
            box-shadow: 0 0 12px #c084fc;
        }
        .task-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #2d2a44;
            transform: none;
        }

        /* Пробники */
        .probnik-section {
            margin: 1.8rem 0;
        }
        .probnik-title {
            color: #c084fc;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .probnik-collapsed {
            background: #1a1730;
            border-radius: 1.2rem;
            margin-bottom: 12px;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-left: 5px solid #a855f7;
            transition: 0.2s;
        }
        .probnik-expanded {
            background: #131026;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: -8px;
            margin-bottom: 15px;
            border: 1px solid #3b2e5e;
            animation: fadeSlide 0.3s;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .probnik-score { font-weight: bold; color: #facc15; }
        .probnik-date { color: #aaa; font-size: 0.8rem; }
        .probnik-note textarea {
            width: 100%;
            background: #0f0c1e;
            border: 1px solid #6b21a5;
            border-radius: 1rem;
            color: #e2e8f0;
            padding: 8px;
        }
        .probnik-photo img {
            max-width: 120px;
            border-radius: 1rem;
            margin-top: 8px;
            cursor: pointer;
            border: 1px solid #a78bfa;
        }
        .probnik-actions button {
            background: #2c2846;
            border: none;
            border-radius: 2rem;
            padding: 5px 12px;
            margin-right: 8px;
            color: white;
            cursor: pointer;
        }
        .add-probnik-btn {
            background: #4c1d95;
            border: none;
            padding: 8px 20px;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .add-probnik-btn.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .add-probnik-btn .cooldown-text {
            margin-left: 8px;
            font-size: 0.8rem;
            background: #00000080;
            padding: 2px 6px;
            border-radius: 20px;
        }

        .frequency-table {
            background: #161329;
            border-radius: 1.5rem;
            margin-top: 2rem;
            padding: 1rem;
            border: 1px solid #4c1d95;
        }
        .freq-title {
            color: #c084fc;
            font-weight: bold;
            margin-bottom: 0.8rem;
            font-size: 1.2rem;
            padding-left: 0.5rem;
        }
        .freq-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 4px;
        }
        .freq-card {
            background: #1f1c38;
            border-radius: 1rem;
            text-align: center;
            padding: 8px 4px;
            border: 1px solid #4a2b7a;
        }
        .freq-num { font-size: 1rem; font-weight: bold; color: #c4b5fd; }
        .freq-count {
            font-size: 1.4rem;
            font-weight: 800;
            color: #b77cff;
            background: #0f0c1c;
            display: inline-block;
            width: 100%;
            border-radius: 30px;
            margin-top: 4px;
        }

        .reset-all-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #3b2e5e80;
            backdrop-filter: blur(4px);
            border: 1px solid #6b21a5;
            color: #c084fc;
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 3rem;
            cursor: pointer;
            z-index: 100;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4c1d95;
            color: white;
            padding: 8px 16px;
            border-radius: 2rem;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        footer {
            text-align: center;
            color: #5a4a7c;
            font-size: 0.7rem;
            margin-top: 1rem;
        }
        .contacts {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #4a3a6c;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="menuScreen" class="menu-screen">
        <h1>🎓 ЕГЭ‑марафон</h1>
        <div style="text-align:center; margin-bottom:1rem; color:#c084fc;">
            🏆 Общий счётчик заданий: <strong id="globalTotalCount">0</strong>
        </div>
        <div class="subjects-grid" id="subjectsGrid"></div>
        <div class="contacts">tg: @mkm1228</div>
        <footer>⚡ +50 XP за задание (можно настроить в управлении, которое временно скрыто). Ранг повышается до Ancient 5★, затем уровень растёт без изменения ранга.</footer>
    </div>

    <div id="subjectScreen" class="subject-screen" style="display: none;">
        <button class="back-btn" id="backToMenu">← Назад к предметам</button>
        <div class="subject-content">
            <h2 id="subjectTitle"></h2>
            <div class="stats-panel">
                <div class="level-box">🎚️ Уровень: <span id="levelValue" class="level-value">1</span> <span id="rankIcon" class="rank-icon"></span></div>
                <div class="xp-box">✨ XP: <span id="xpValue" class="xp-value">0</span></div>
                <div class="total-tasks-box">📋 Выполнено: <span id="totalTasksDone" class="total-value">0</span></div>
            </div>
            <div class="progress-area">
                <div class="progress-bg"><div class="progress-fill" id="xpBarFill"></div></div>
                <div style="font-size:0.7rem; text-align:right; color:#aaa;" id="nextXpHint"></div>
            </div>
            <div id="taskContainer" class="task-grid"></div>
            <div class="probnik-section">
                <div class="probnik-title">📝 Пробники</div>
                <div id="probnikList"></div>
                <button class="add-probnik-btn" id="addProbnikBtn">➕ Добавить пробник</button>
            </div>
            <div class="frequency-table">
                <div class="freq-title">📊 Количество выполненных заданий</div>
                <div id="frequencyContainer" class="freq-items"></div>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>
<button id="globalResetBtn" class="reset-all-btn">🗑️ Бросить все</button>

<script>
    // ---------- Ранги Dota 2 (максимальный Ancient 5★, дальше уровень растёт но ранг не меняется) ----------
    const rankList = [
        { level: 1, name: "Herald", emoji: "🪶", stars: 1 }, { level: 2, name: "Herald", emoji: "🪶", stars: 2 },
        { level: 3, name: "Herald", emoji: "🪶", stars: 3 }, { level: 4, name: "Herald", emoji: "🪶", stars: 4 },
        { level: 5, name: "Herald", emoji: "🪶", stars: 5 }, { level: 6, name: "Guardian", emoji: "🛡️", stars: 1 },
        { level: 7, name: "Guardian", emoji: "🛡️", stars: 2 }, { level: 8, name: "Guardian", emoji: "🛡️", stars: 3 },
        { level: 9, name: "Guardian", emoji: "🛡️", stars: 4 }, { level: 10, name: "Guardian", emoji: "🛡️", stars: 5 },
        { level: 11, name: "Crusader", emoji: "⚔️", stars: 1 }, { level: 12, name: "Crusader", emoji: "⚔️", stars: 2 },
        { level: 13, name: "Crusader", emoji: "⚔️", stars: 3 }, { level: 14, name: "Crusader", emoji: "⚔️", stars: 4 },
        { level: 15, name: "Crusader", emoji: "⚔️", stars: 5 }, { level: 16, name: "Archon", emoji: "🏛️", stars: 1 },
        { level: 17, name: "Archon", emoji: "🏛️", stars: 2 }, { level: 18, name: "Archon", emoji: "🏛️", stars: 3 },
        { level: 19, name: "Archon", emoji: "🏛️", stars: 4 }, { level: 20, name: "Archon", emoji: "🏛️", stars: 5 },
        { level: 21, name: "Legend", emoji: "📜", stars: 1 }, { level: 22, name: "Legend", emoji: "📜", stars: 2 },
        { level: 23, name: "Legend", emoji: "📜", stars: 3 }, { level: 24, name: "Legend", emoji: "📜", stars: 4 },
        { level: 25, name: "Legend", emoji: "📜", stars: 5 }, { level: 26, name: "Ancient", emoji: "🏺", stars: 1 },
        { level: 27, name: "Ancient", emoji: "🏺", stars: 2 }, { level: 28, name: "Ancient", emoji: "🏺", stars: 3 },
        { level: 29, name: "Ancient", emoji: "🏺", stars: 4 }, { level: 30, name: "Ancient", emoji: "🏺", stars: 5 }
    ];
    function getStarSVG(count) { 
        let html = ''; 
        for (let i=0;i<count;i++) html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block; margin-left:2px;"><path d="M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"/></svg>`; 
        return html; 
    }
    function getRankDisplay(level) { 
        if (level < 1) level = 1;
        // если уровень выше максимального в списке (30) — показываем Ancient 5 звезд
        if (level > 30) {
            return { html: `🏺 Ancient ${getStarSVG(5)}` };
        }
        const r = rankList.find(r=>r.level===level);
        if(!r) return {html:"🪶 Herald ⭐"};
        return {html:`${r.emoji} ${r.name} ${getStarSVG(r.stars)}`};
    }

    // ---------- Игровая логика ----------
    const SUBJECTS = [
        { name: "Русский язык", tasks: 27 },
        { name: "Проф. математика", tasks: 19 },
        { name: "Информатика", tasks: 27 },
        { name: "Физика", tasks: 30 }
    ];
    const STORAGE_KEY = "ege_dota_ranks_v12";
    let customXpPerTask = 50;
    let xpMultiplier = 1;
    let cooldownEnabled = true;

    let taskCooldownUntil = 0;
    let probnikCooldownUntil = 0;
    let probnikTimerInterval = null;

    function xpRequiredForNextLevel(level) { return level * 100; }
    function computeLevelFromXP(xp) {
        let level = 1;
        let need = xpRequiredForNextLevel(level);
        while (xp >= need) {
            xp -= need;
            level++;
            need = xpRequiredForNextLevel(level);
        }
        // уровень может быть любым (без ограничения)
        return level;
    }
    function xpInCurrentLevel(xp) {
        let level = 1;
        let remaining = xp;
        let need = xpRequiredForNextLevel(level);
        while (remaining >= need) {
            remaining -= need;
            level++;
            need = xpRequiredForNextLevel(level);
        }
        return remaining;
    }
    function xpNeededForNext(xp) {
        let level = 1;
        let remaining = xp;
        let need = xpRequiredForNextLevel(level);
        while (remaining >= need) {
            remaining -= need;
            level++;
            need = xpRequiredForNextLevel(level);
        }
        return need - remaining;
    }

    let appState = {};
    function initState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                for (let subj of SUBJECTS) {
                    const data = parsed[subj.name] || { xp: 0, probniks: [], taskCounts: [] };
                    let taskCounts = data.taskCounts || [];
                    if (taskCounts.length !== subj.tasks) {
                        let newCounts = new Array(subj.tasks).fill(0);
                        for (let i=0; i<Math.min(taskCounts.length, subj.tasks); i++) newCounts[i]=taskCounts[i]||0;
                        taskCounts = newCounts;
                    }
                    appState[subj.name] = { xp: data.xp || 0, probniks: data.probniks || [], taskCounts: taskCounts };
                }
            } catch(e) { buildFreshState(); }
        } else { buildFreshState(); }
        for (let subj of SUBJECTS) {
            const state = appState[subj.name];
            const totalCompletions = state.taskCounts.reduce((a,b)=>a+b,0);
            const expectedXP = totalCompletions * customXpPerTask;
            if (state.xp !== expectedXP) state.xp = expectedXP;
        }
        persistState();
    }
    function buildFreshState() {
        for (let subj of SUBJECTS) appState[subj.name] = { xp: 0, probniks: [], taskCounts: new Array(subj.tasks).fill(0) };
    }
    function persistState() {
        const toStore = {};
        for (let subj of SUBJECTS) toStore[subj.name] = { xp: appState[subj.name].xp, probniks: appState[subj.name].probniks, taskCounts: appState[subj.name].taskCounts };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toStore));
        showToast("💾 Сохранено", false);
    }
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.background = isError ? '#992525dd' : '#4c1d95';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function updateGlobalCounter() {
        let total = 0;
        for (let subj of SUBJECTS) total += appState[subj.name].taskCounts.reduce((a,b)=>a+b,0);
        document.getElementById('globalTotalCount').innerText = total;
    }

    // Анимация звёзд, которые долго падают (2 секунды)
    function explodeStars(x, y, scale = 1) {
        const count = Math.floor(12 * scale);
        const container = document.body;
        for (let i=0;i<count;i++) {
            const star = document.createElement('div');
            star.className = 'star-particle';
            star.innerHTML = '⭐';
            star.style.position = 'fixed';
            star.style.left = x + 'px';
            star.style.top = y + 'px';
            star.style.pointerEvents = 'none';
            star.style.zIndex = '2000';
            star.style.fontSize = (1.2 * Math.sqrt(scale)) + 'rem';
            const angle = Math.random() * Math.PI * 2;
            const dist = (50 + Math.random() * 100) * scale;
            const dx = Math.cos(angle)*dist, dy = Math.sin(angle)*dist;
            star.style.setProperty('--dx', dx+'px');
            star.style.setProperty('--dy', dy+'px');
            star.style.animation = 'flyOut 2s ease-out forwards';
            container.appendChild(star);
            setTimeout(() => star.remove(), 2000);
        }
    }
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `@keyframes flyOut { 0% { opacity:1; transform:translate(0,0) scale(1); } 100% { opacity:0; transform:translate(var(--dx), var(--dy)) scale(0); } } .star-particle { position:fixed; z-index:2000; }`;
    document.head.appendChild(styleSheet);

    function addXp(subjectName, amount, isFromTask = false, taskIndex = -1) {
        const state = appState[subjectName];
        if (!state) return;
        const oldLevel = computeLevelFromXP(state.xp);
        state.xp += amount;
        if (state.xp < 0) state.xp = 0;
        if (isFromTask && taskIndex>=0) state.taskCounts[taskIndex]++;
        persistState();
        const newLevel = computeLevelFromXP(state.xp);
        if (newLevel > oldLevel) {
            const rankIcon = document.getElementById('rankIcon');
            if (rankIcon) {
                const rect = rankIcon.getBoundingClientRect();
                // при повышении уровня — в 3 раза больше звёзд
                explodeStars(rect.left + rect.width/2, rect.top + rect.height/2, 3);
            }
            showToast(`🎉 ПОВЫШЕНИЕ УРОВНЯ! ${oldLevel} → ${newLevel}`, false);
        }
        renderSubjectPage(subjectName);
        updateGlobalCounter();
    }

    function completeTask(subjectName, taskIndex) {
        if (cooldownEnabled && Date.now() < taskCooldownUntil) {
            const rem = Math.ceil((taskCooldownUntil - Date.now()) / 1000);
            showToast(`⏳ Кулдаун заданий: ${rem} сек`, true);
            return;
        }
        if (!confirm(`Выполнить задание ${taskIndex+1}? +${Math.round(customXpPerTask * xpMultiplier)} XP`)) return;
        const xpGain = Math.round(customXpPerTask * xpMultiplier);
        addXp(subjectName, xpGain, true, taskIndex);
        showToast(`✅ Задание ${taskIndex+1} выполнено! +${xpGain} XP`, false);
        if (cooldownEnabled) {
            taskCooldownUntil = Date.now() + 30000;
            renderSubjectPage(subjectName);
            // перерисовка через интервал для обновления disabled состояния кнопок
            const interval = setInterval(() => {
                if (!currentSubject || (cooldownEnabled && Date.now() >= taskCooldownUntil)) {
                    clearInterval(interval);
                    if (currentSubject) renderSubjectPage(currentSubject);
                } else if (currentSubject) {
                    renderSubjectPage(currentSubject);
                }
            }, 500);
        }
    }

    function addProbnik(subjectName) {
        if (cooldownEnabled && Date.now() < probnikCooldownUntil) {
            const rem = Math.ceil((probnikCooldownUntil - Date.now()) / 1000);
            const minutes = Math.floor(rem/60);
            const seconds = rem % 60;
            showToast(`⏳ Кулдаун пробников: ${minutes} мин ${seconds} сек`, true);
            return;
        }
        let score = prompt("Введите баллы пробника (0–100):", "0");
        if (score === null) return;
        let num = parseInt(score,10);
        if (isNaN(num) || num<0 || num>100) { showToast("Ошибка: введите число от 0 до 100", true); return; }
        const newProbnik = { id: Date.now(), date: new Date().toLocaleString(), score: num, note: "", screenshot: null, expanded: false };
        appState[subjectName].probniks.unshift(newProbnik);
        addXp(subjectName, 250, false, -1);
        showToast(`✅ Пробник добавлен! +250 XP за пробник`, false);
        if (cooldownEnabled) {
            probnikCooldownUntil = Date.now() + 300000;
            // очищаем предыдущий интервал, если есть
            if (probnikTimerInterval) clearInterval(probnikTimerInterval);
            probnikTimerInterval = setInterval(() => {
                if (!currentSubject || (cooldownEnabled && Date.now() >= probnikCooldownUntil)) {
                    clearInterval(probnikTimerInterval);
                    probnikTimerInterval = null;
                    if (currentSubject) renderSubjectPage(currentSubject);
                } else if (currentSubject) {
                    renderSubjectPage(currentSubject);
                }
            }, 1000);
        }
        renderSubjectPage(subjectName);
    }

    function deleteProbnik(subjectName, id) {
        if (confirm("Удалить пробник? Отнимется 250 XP.")) {
            const probnik = appState[subjectName].probniks.find(p => p.id === id);
            if (probnik) {
                appState[subjectName].probniks = appState[subjectName].probniks.filter(p => p.id !== id);
                addXp(subjectName, -250, false, -1);
                showToast(`🗑️ Пробник удалён, -250 XP`, false);
                probnikCooldownUntil = 0;
                if (probnikTimerInterval) { clearInterval(probnikTimerInterval); probnikTimerInterval = null; }
                renderSubjectPage(subjectName);
            }
        }
    }

    function updateProbnikNote(subjectName, id, newNote) {
        const p = appState[subjectName].probniks.find(p=>p.id===id);
        if(p) { p.note = newNote; persistState(); renderSubjectPage(subjectName); }
    }
    function uploadProbnikPhoto(subjectName, id, file) {
        if (!file.type.startsWith('image/')) { showToast("Только изображения", true); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
            const p = appState[subjectName].probniks.find(p=>p.id===id);
            if(p) { p.screenshot = e.target.result; persistState(); renderSubjectPage(subjectName); showToast("🖼️ Фото сохранено"); }
        };
        reader.readAsDataURL(file);
    }
    function toggleProbnik(subjectName, id) {
        const p = appState[subjectName].probniks.find(p=>p.id===id);
        if(p) { p.expanded = !p.expanded; renderSubjectPage(subjectName); }
    }
    function resetAllSubjects() {
        if (confirm("⚠️ Удалить ВСЕ задания, XP и пробники?") && confirm("Ещё раз подтвердите")) {
            buildFreshState(); persistState(); renderMainMenu();
            if (document.getElementById('subjectScreen').style.display !== 'none') backToMenu();
            updateGlobalCounter(); showToast("♻️ Сброшено");
        }
    }

    function renderMainMenu() {
        const grid = document.getElementById('subjectsGrid'); grid.innerHTML = '';
        let globalTotal = 0;
        for (let subj of SUBJECTS) {
            const state = appState[subj.name];
            const total = state.taskCounts.reduce((a,b)=>a+b,0); globalTotal+=total;
            const level = computeLevelFromXP(state.xp);
            const rank = getRankDisplay(level);
            const card = document.createElement('div'); card.className='subject-card';
            card.innerHTML = `<div class="subject-title">${subj.name}</div><div class="subject-stats">🎚️ Уровень ${level} ${rank.html} | ✅ Заданий: ${total} | 📌 Пробников: ${state.probniks.length}</div>`;
            card.addEventListener('click', ()=>openSubject(subj.name));
            grid.appendChild(card);
        }
        document.getElementById('globalTotalCount').innerText = globalTotal;
    }

    let currentSubject = null;
    function openSubject(subjectName) {
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('subjectScreen').style.display = 'block';
        currentSubject = subjectName;
        renderSubjectPage(subjectName);
    }

    function renderSubjectPage(subjectName) {
        const config = SUBJECTS.find(s=>s.name===subjectName);
        if (!config) return;
        const state = appState[subjectName];
        const totalCompletions = state.taskCounts.reduce((a,b)=>a+b,0);
        const level = computeLevelFromXP(state.xp);
        const rank = getRankDisplay(level);
        const xpNow = xpInCurrentLevel(state.xp);
        const neededTotal = xpRequiredForNextLevel(level);
        const percent = (xpNow / neededTotal) * 100;

        document.getElementById('subjectTitle').innerText = subjectName;
        document.getElementById('levelValue').innerText = level;
        document.getElementById('rankIcon').innerHTML = rank.html;
        document.getElementById('xpValue').innerText = xpNow;
        document.getElementById('totalTasksDone').innerText = totalCompletions;
        const fillBar = document.getElementById('xpBarFill');
        fillBar.style.width = percent+'%';
        if (percent >= 80) fillBar.classList.add('high-boil');
        else fillBar.classList.remove('high-boil');
        document.getElementById('nextXpHint').innerHTML = `До следующего уровня: ${xpNeededForNext(state.xp)} XP`;

        // Кнопки заданий
        const taskContainer = document.getElementById('taskContainer');
        taskContainer.innerHTML = '';
        const tasksLocked = (cooldownEnabled && Date.now() < taskCooldownUntil);
        for (let i=1; i<=config.tasks; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.classList.add('task-btn');
            if (tasksLocked) btn.classList.add('disabled');
            btn.addEventListener('click', (function(idx){
                return () => { if (!btn.classList.contains('disabled')) completeTask(subjectName, idx-1); };
            })(i));
            taskContainer.appendChild(btn);
        }

        // Пробники
        const probnikDiv = document.getElementById('probnikList');
        probnikDiv.innerHTML = '';
        for (let prob of state.probniks) {
            const collapsed = document.createElement('div'); collapsed.className='probnik-collapsed';
            collapsed.innerHTML = `<div><span class="probnik-date">📅 ${prob.date}</span> <span class="probnik-score">🎯 Баллы: ${prob.score}/100</span></div><span>${prob.expanded?'▲':'▼'}</span>`;
            collapsed.addEventListener('click', ()=>toggleProbnik(subjectName, prob.id));
            probnikDiv.appendChild(collapsed);
            if (prob.expanded) {
                const expanded = document.createElement('div'); expanded.className='probnik-expanded';
                expanded.innerHTML = `<div class="probnik-note"><textarea rows="2" placeholder="Заметка...">${escapeHtml(prob.note)}</textarea></div><div class="probnik-photo" id="photo-${prob.id}"></div><div class="probnik-actions"><button class="upload-photo-btn" data-id="${prob.id}">📷 Загрузить фото</button><button class="delete-probnik-btn" data-id="${prob.id}">🗑️ Удалить</button></div>`;
                probnikDiv.appendChild(expanded);
                const photoDiv = expanded.querySelector('.probnik-photo');
                if (prob.screenshot) {
                    const img = document.createElement('img'); img.src=prob.screenshot; img.style.maxWidth='120px'; img.style.cursor='pointer';
                    img.addEventListener('click', (e)=>{ e.stopPropagation(); openModalWithImage(prob.screenshot); });
                    photoDiv.appendChild(img);
                }
                const ta = expanded.querySelector('textarea');
                ta.addEventListener('blur', (e)=>updateProbnikNote(subjectName, prob.id, e.target.value));
                const uploadBtn = expanded.querySelector('.upload-photo-btn');
                const fileInput = document.createElement('input'); fileInput.type='file'; fileInput.accept='image/*'; fileInput.style.display='none';
                uploadBtn.parentNode.appendChild(fileInput);
                uploadBtn.addEventListener('click', ()=>fileInput.click());
                fileInput.addEventListener('change', (e)=>{ if(e.target.files.length) uploadProbnikPhoto(subjectName, prob.id, e.target.files[0]); });
                const delBtn = expanded.querySelector('.delete-probnik-btn');
                delBtn.addEventListener('click', ()=>deleteProbnik(subjectName, prob.id));
            }
        }

        // Кнопка добавления пробника с таймером
        const addProbnikBtn = document.getElementById('addProbnikBtn');
        const newAddBtn = addProbnikBtn.cloneNode(true);
        addProbnikBtn.parentNode.replaceChild(newAddBtn, addProbnikBtn);
        if (cooldownEnabled && Date.now() < probnikCooldownUntil) {
            newAddBtn.classList.add('disabled');
            const rem = Math.ceil((probnikCooldownUntil - Date.now()) / 1000);
            const minutes = Math.floor(rem/60);
            const seconds = rem % 60;
            let cdSpan = newAddBtn.querySelector('.cooldown-text');
            if (!cdSpan) {
                cdSpan = document.createElement('span');
                cdSpan.className = 'cooldown-text';
                newAddBtn.appendChild(cdSpan);
            }
            cdSpan.innerText = `${minutes}:${seconds.toString().padStart(2,'0')}`;
        } else {
            newAddBtn.classList.remove('disabled');
            const oldSpan = newAddBtn.querySelector('.cooldown-text');
            if (oldSpan) oldSpan.remove();
        }
        newAddBtn.addEventListener('click', () => addProbnik(subjectName));

        // Таблица частот
        const freqContainer = document.getElementById('frequencyContainer');
        freqContainer.innerHTML = '';
        for (let i=0; i<state.taskCounts.length; i++) {
            const card = document.createElement('div'); card.className='freq-card';
            card.innerHTML = `<div class="freq-num">№${i+1}</div><div class="freq-count">${state.taskCounts[i]}</div>`;
            freqContainer.appendChild(card);
        }
        updateGlobalCounter();
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function openModalWithImage(src) {
        const modal = document.createElement('div'); modal.style.position='fixed'; modal.style.top=0; modal.style.left=0; modal.style.width='100%'; modal.style.height='100%';
        modal.style.backgroundColor='rgba(0,0,0,0.9)'; modal.style.zIndex=2000; modal.style.display='flex';
        modal.style.justifyContent='center'; modal.style.alignItems='center'; modal.style.flexDirection='column';
        const img = document.createElement('img'); img.src=src; img.style.maxWidth='90%'; img.style.maxHeight='80%'; img.style.objectFit='contain';
        let zoom=1;
        const closeSpan = document.createElement('span'); closeSpan.innerHTML='&times;'; closeSpan.style.position='absolute'; closeSpan.style.top='20px';
        closeSpan.style.right='30px'; closeSpan.style.color='white'; closeSpan.style.fontSize='2rem'; closeSpan.style.cursor='pointer';
        closeSpan.addEventListener('click', ()=>modal.remove());
        const zoomControls = document.createElement('div'); zoomControls.style.position='absolute'; zoomControls.style.bottom='20px';
        zoomControls.style.left='50%'; zoomControls.style.transform='translateX(-50%)'; zoomControls.style.background='#222';
        zoomControls.style.padding='8px 20px'; zoomControls.style.borderRadius='40px'; zoomControls.style.display='flex'; zoomControls.style.gap='20px';
        const zoomOut = document.createElement('button'); zoomOut.textContent='-'; zoomOut.style.background='#c084fc'; zoomOut.style.border='none'; zoomOut.style.padding='4px 12px'; zoomOut.style.borderRadius='30px'; zoomOut.style.cursor='pointer';
        const zoomIn = document.createElement('button'); zoomIn.textContent='+'; zoomIn.style.cssText = zoomOut.style.cssText;
        const zoomLevel = document.createElement('span'); zoomLevel.textContent='100%'; zoomLevel.style.color='white';
        zoomOut.addEventListener('click', ()=>{ zoom = Math.max(0.5, zoom-0.2); img.style.transform=`scale(${zoom})`; zoomLevel.textContent=`${Math.round(zoom*100)}%`; });
        zoomIn.addEventListener('click', ()=>{ zoom = Math.min(3, zoom+0.2); img.style.transform=`scale(${zoom})`; zoomLevel.textContent=`${Math.round(zoom*100)}%`; });
        zoomControls.append(zoomOut, zoomLevel, zoomIn);
        modal.append(closeSpan, img, zoomControls);
        modal.addEventListener('click', (e)=>{ if(e.target===modal) modal.remove(); });
        document.body.appendChild(modal);
    }

    function backToMenu() {
        document.getElementById('menuScreen').style.display = 'block';
        document.getElementById('subjectScreen').style.display = 'none';
        renderMainMenu();
    }

    initState();
    renderMainMenu();
    document.getElementById('backToMenu').addEventListener('click', backToMenu);
    document.getElementById('globalResetBtn').addEventListener('click', resetAllSubjects);
</script>
</body>
</html>
